<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNIST Hand-Written Digit Classifier</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Hand-Written Digit Classifier</h1>
            <p>Draw a digit (0-9) in the box below</p>
        </header>

        <main>
            <div class="drawing-area">
                <canvas id="digit-canvas" width="280" height="280"></canvas>
                <div class="controls">
                    <button id="clear-btn">Clear Canvas</button>
                    <button id="predict-btn">Predict</button>
                </div>
            </div>

            <div class="results-area">
                <div id="prediction-display">
                    <h2>Prediction: <span id="predicted-digit">-</span></h2>
                </div>
                <div class="chart-container">
                    <div id="probability-chart">
                        <!-- Bars will be generated by JavaScript -->
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>Powered by a C-trained Neural Network Engine</p>
        </footer>
    </div>
    <script src="main.js"></script>
</body>
</html>
